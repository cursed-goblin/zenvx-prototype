name: build

on:
  push:
  pull_request:

env:
  # Opt into Node.js 24 for JS-based actions early
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Debug info
        run: |
          pwd
          ls -la
          python --version

      - name: Syntax check
        run: |
          python -m compileall -q src

      - name: Smoke test (offline runner)
        env:
          ZENVX_MOCK: '1'
        run: |
          PYTHONPATH=./src python -m zenvx doctor
          PYTHONPATH=./src python -m zenvx list || true

      - name: Done
        run: echo "Build completed (prototype offline mode)."